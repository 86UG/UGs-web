<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="食材の内容量と価格を入力すると、お店ごとの単価を比較できます。自炊・節約・家計管理に。">
    <meta name="google-site-verification" content="JUQzpSWXDlmY2dKkkwU9a716EybnjabIKuK38MrQCgc" />
    <meta property="og:type" content="website">
    <meta property="og:title" content="どこが安い？｜食材価格比較ツール">
    <meta property="og:description" content="食材の内容量と価格を入力すると、お店ごとの単価を比較できます。">
    <meta property="og:url" content="https://ugs-web.vercel.app/comparator/">
    <meta name="twitter:card" content="summary">
    <title>どこが安い？｜食材価格比較ツール</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>

    <!-- 共通ヘッダー -->
    <header class="site-header">
      <a href="/" class="site-logo">UGtools</a>
      <p class="site-tagline">自炊・節約に役立つ計算ツール集</p>
    </header>

    <div class="page-wrapper">

      <div id="title-area">
        <h1>どこが安い？</h1>
        <p>食材の内容量と価格を入力すると、お店ごとの単価を比較できます。</p>
      </div>

      <div class="container">

        <!-- 左カラム：入力パネル -->
        <div class="col-left">
          <section class="panel">
            <h2>✍️食材を登録する</h2>

            <div class="input-grid">
              <div class="field-group">
                <label for="i-store">店舗名</label>
                <div class="ac-wrapper">
                  <input type="text" id="i-store" placeholder="例：Aスーパー" autocomplete="off">
                  <ul class="suggestions hidden" id="sug-store"></ul>
                </div>
              </div>
              <div class="field-group">
                <label for="i-food">食材名</label>
                <div class="ac-wrapper">
                  <input type="text" id="i-food" placeholder="例：卵" autocomplete="off">
                  <ul class="suggestions hidden" id="sug-food"></ul>
                </div>
              </div>
              <div class="field-group">
                <label>内容量</label>
                <div class="total-wrapper">
                  <input type="text" id="i-qty" inputmode="decimal" placeholder="例：10" class="total">
                  <select id="i-unit" class="unit">
                    <option value="個">個</option>
                    <option value="g">g</option>
                    <option value="mL">mL</option>
                  </select>
                </div>
              </div>
              <div class="field-group">
                <label for="i-price">価格</label>
                <input type="text" id="i-price" inputmode="decimal" placeholder="例：198">
              </div>
            </div>

            <!-- リアルタイム単価表示 -->
            <div class="unit-price-display" id="upd">
              <span class="upd-hint">内容量と価格を入力すると単価が表示されます</span>
            </div>

            <!-- カテゴリ -->
            <div class="field-group" style="margin-top:8px;">
              <label for="i-category">カテゴリ（任意）</label>
              <div class="ac-wrapper">
                <input type="text" id="i-category" placeholder="例：野菜・肉類・乳製品" autocomplete="off">
                <ul class="suggestions hidden" id="sug-category"></ul>
              </div>
            </div>

            <!-- メモ -->
            <div class="field-group" style="margin-top:8px;">
              <label for="i-memo">メモ（任意）</label>
              <input type="text" id="i-memo" placeholder="例：特売時の価格">
            </div>

            <button class="btn-primary register-btn" onclick="registerItem()">登録</button>
            <div id="reg-msg" class="reg-msg"></div>
          </section>
        </div>

        <!-- 右カラム：比較パネル -->
        <div class="col-right">
          <section class="panel" id="compare-panel">
            <h2>🍞食材リスト</h2>
            <div id="compare-body">
              <div class="tabs">
                <button class="tab active" onclick="switchTab(0)">食材ごと</button>
                <button class="tab" onclick="switchTab(1)">お店ごと</button>
                <div class="row-actions" >
                  <button class="btn-secondary btn-icon" onclick="exportCSV()" aria-label="csvファイル出力" title="csvファイル出力">
                    <!-- <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path fill="currentColor" d="M7 4 C5.34 4 4 5.34 4 7 V17 C4 18.66 5.34 20 7 20 H17 C18.66 20 20 18.66 20 17 V7 C20 5.34 18.66 4 17 4 H15 V6 H17 C17.55 6 18 6.45 18 7 V17 C18 17.55 17.55 18 17 18 H7 C6.45 18 6 17.55 6 17 V7 C6 6.45 6.45 6 7 6 H9 V4 H7 Z M11 21 H13 V12.83 L15.59 15.41 L17 14 L12 9 L7 14 L8.41 15.41 L11 12.83 V21 Z"/></svg> -->
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path fill="currentColor" d="M11 21h2V10.83l3.59 3.58L18 13l-6-6-6 6 1.41 1.41L11 10.83V21zm-7-18h16v2H4V3z"/></svg>
                  </button>
                  <button class="btn-secondary btn-icon" onclick="document.getElementById('import-file').click()" aria-label="csvファイル取り込み" title="csvファイル取り込み">
                    <!-- <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path fill="currentColor" d="M7 4 C5.34 4 4 5.34 4 7 V17 C4 18.66 5.34 20 7 20 H17 C18.66 20 20 18.66 20 17 V7 C20 5.34 18.66 4 17 4 H15 V6 H17 C17.55 6 18 6.45 18 7 V17 C18 17.55 17.55 18 17 18 H7 C6.45 18 6 17.55 6 17 V7 C6 6.45 6.45 6 7 6 H9 V4 H7 Z M11 3 H13 V11.17 L15.59 8.59 L17 10 L12 15 L7 10 L8.41 8.59 L11 11.17 V3 Z"/></svg> -->
                    <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24"><path fill="currentColor" d="M11 3h2v10.17l3.59-3.58L18 11l-6 6-6-6 1.41-1.41L11 13.17V3zm-7 16h16v2H4v-2z"/></svg>
                  </button>
                </div>
              </div>
              <div id="view-food">
                <p class="empty-msg">食材を登録すると比較が表示されます</p>
              </div>
              <div id="view-store" style="display:none;">
                <p class="empty-msg">食材を登録すると比較が表示されます</p>
              </div>
            </div>
          </section>
        </div>

      </div>

    </div><!-- /.page-wrapper -->

    <footer id="site-footer">
      <p class="footer-copy">© 2026 UGtools</p>
      <nav class="footer-nav">
        <a href="../privacy-policy.html">プライバシーポリシー</a>
      </nav>
    </footer>
    
    <!-- インポート用隠しinput -->
    <input type="file" id="import-file" accept=".csv" class="hidden" onchange="importCSV(this)">

    <script src="main.js" defer></script>
  </body>
</html>
