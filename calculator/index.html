<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="食材の内容量・価格・使用量からレシピ一人前の費用を計算できるツール。よく使う食材やレシピは保存も可能。自炊・節約・家計管理に。">
    <meta name="google-site-verification" content="JUQzpSWXDlmY2dKkkwU9a716EybnjabIKuK38MrQCgc" />
    <meta property="og:type" content="website">
    <meta property="og:title" content="その一皿、いくら？｜食費計算・一人前コスト計算ツール">
    <meta property="og:description" content="食材の内容量・価格・使用量からレシピ一人前の費用を計算できるツール。自炊・節約・家計管理に。">
    <meta property="og:url" content="https://ugs-web.vercel.app/calculator/">
    <meta name="twitter:card" content="summary">
    <title>その一皿、いくら？｜食費計算・一人前コスト計算ツール</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  </head>

  <body>

    <!-- 共通ヘッダー -->
    <header class="site-header">
      <a href="/" class="site-logo">★★★</a>
      <p class="site-tagline">自炊・節約に役立つ計算ツール集</p>
    </header>

    <div class="page-wrapper">

      <!-- タイトル -->
      <div id="title-area">
        <h1>その一皿、いくら？</h1>
        <p>食材の内容量・価格・使用量を入力すると、レシピ一人前の費用がわかります。</p>
      </div>

      <!-- 本文 -->
      <div class="container">
        <!-- 左カラム -->
        <div class="col-left">
          <!-- 入力パネル -->
          <section class="panel">
            <h2>✍️レシピを入力する</h2>
            <div class="servings">
              レシピ：
              <input type="text" id="people" inputmode="decimal" value="1">
              人前
            </div>
            <div id="ingredient-row"></div>
            <button class="btn-secondary add-btn" onclick="addRow()">＋ 食材を追加する</button>
            <br>
            <button class="btn-primary calc-btn" onclick="calculate()">計算</button>
            <button class="btn-secondary recipe-save-btn" onclick="openRecipeModal()">レシピを保存</button>
          </section>

          <!-- 結果パネル -->
          <section class="panel hidden" id="result-panel">
            <div class="result" id="result"></div>
          </section>
        </div>

        <!-- 右カラム -->
        <div class="col-right">
          <!-- 一覧パネル -->
          <section class="panel">
            <div class="panel-header-toggle" onclick="togglePanel('ingredient-list-body', this)">
              <h2>食材リスト</h2>
              <span class="toggle-icon">▲</span>
            </div>
            <div id="ingredient-list-body">
              <div class="list-header">
                <div class="col-name">食材名</div>
                <div class="col-total">内容量</div>
                <div class="col-price">価格</div>
              </div>
              <div id="ingredient-list"></div>
            </div>
          </section>
          <!-- レシピパネル -->
          <section class="panel">
            <h2>保存済みレシピ</h2>
            <div id="recipe-list"></div>
          </section>
        </div>
      </div>

    </div>

    <!-- 上書き確認モーダル -->
    <div id="overwrite-modal" class="modal-overlay hidden">
      <div class="modal">
        <h3>同名のレシピが存在します</h3>
        <p class="modal-msg">「<span id="overwrite-recipe-name"></span>」を上書きしますか？</p>
        <div class="modal-actions">
          <button class="btn-secondary" id="btn-cancel-overwrite">キャンセル</button>
          <button class="btn-secondary" id="btn-new-save">新規保存</button>
          <button class="btn-primary" id="btn-overwrite">上書き保存</button>
        </div>
      </div>
    </div>

    <!-- レシピ名入力モーダル -->
    <div id="recipe-modal" class="modal-overlay hidden">
      <div class="modal">
        <h3>レシピ名を入力</h3>
        <input type="text" id="recipe-name-input" placeholder="例：鶏肉の煮込み" maxlength="40">
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeRecipeModal()">キャンセル</button>
          <button class="btn-primary" onclick="confirmSaveRecipe()">保存</button>
        </div>
      </div>
    </div>

    <!-- フッター -->
    <footer id="site-footer">
      <p class="footer-copy">© 2026 ★★★</p>
      <nav class="footer-nav">
        <a href="../privacy-policy.html">プライバシーポリシー</a>
      </nav>
    </footer>

    <script src="main.js" defer></script>

  </body>
</html>
